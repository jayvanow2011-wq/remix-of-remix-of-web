# Nginx reverse proxy for veltrix.hidenfree.com → vicky.hidencloud.com:24609
# Drop in /etc/nginx/sites-available/veltrix and `ln -s` into sites-enabled.
# Run `certbot --nginx -d veltrix.hidenfree.com` once for the TLS cert.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name veltrix.hidenfree.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name veltrix.hidenfree.com;

    ssl_certificate     /etc/letsencrypt/live/veltrix.hidenfree.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veltrix.hidenfree.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Big WS frames (screen frames, file chunks)
    client_max_body_size 50m;
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    proxy_buffering      off;

    location / {
        proxy_pass http://vicky.hidencloud.com:24609;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
